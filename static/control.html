<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%231a1a2e'/><text x='50' y='76' font-size='80' font-weight='bold' font-family='sans-serif' fill='%23e2b714' text-anchor='middle'>H</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — Control Panel</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" title="Home">&#8962;</a>
    <a href="/help" title="Help">?</a>
    <a href="/account" title="Account">&#9881;</a>
  </nav>
  <main>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle">Control Panel</p>

    <div class="control-section">
      <h2>Create Invite</h2>
      <form id="create-invite-form">
        <div class="control-row">
          <div class="settings-field">
            <label for="invite-alias">Alias (optional)</label>
            <input type="text" id="invite-alias" placeholder="e.g. friends, beta" autocomplete="off" maxlength="40">
          </div>
          <div class="settings-field">
            <label for="invite-uses">Uses</label>
            <input type="number" id="invite-uses" value="1" min="1" max="1000">
          </div>
          <div class="settings-field">
            <label for="invite-role">Role</label>
            <select id="invite-role">
              <option value="user" selected>user</option>
              <option value="dev">dev</option>
            </select>
          </div>
          <div class="settings-field">
            <label for="invite-question-limit">Question limit</label>
            <input type="number" id="invite-question-limit" placeholder="105" min="1" max="10000">
          </div>
          <div class="settings-field">
            <label for="invite-topic-limit">Topic limit</label>
            <input type="number" id="invite-topic-limit" placeholder="1" min="0" max="1000">
          </div>
        </div>
        <button type="submit" id="create-invite-btn">Create</button>
        <p id="create-invite-status" hidden></p>
      </form>
    </div>

    <div class="control-section">
      <h2>Invites</h2>
      <div id="invites-list"></div>
    </div>

    <div class="control-section">
      <h2>Users</h2>
      <div id="users-list"></div>
    </div>

    <div class="control-section">
      <h2>Query</h2>
      <form id="query-form">
        <textarea id="query-input" rows="3" placeholder="SELECT * FROM accounts LIMIT 10" spellcheck="false"></textarea>
        <div class="query-buttons">
          <button type="submit" id="query-btn">Run</button>
          <button type="button" id="tables-btn">Tables</button>
          <button type="button" id="select-btn">Select</button>
        </div>
      </form>
      <div id="query-result"></div>
    </div>
  </main>
  <script src="/static/control.js"></script>
</body>
</html>
