<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%231a1a2e'/><text x='50' y='76' font-size='80' font-weight='bold' font-family='sans-serif' fill='%23e2b714' text-anchor='middle'>H</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — 21 Questions</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" title="Home">&#8962;</a>
    <a href="/help" title="Help">?</a>
    <a href="/account" title="Account">&#9881;</a>
  </nav>
  <main>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle" id="game-subtitle">21 Questions</p>
    <p class="date" id="today-date"></p>

    <div id="game-area">
      <div id="question-log"></div>

      <aside id="hint-panel" hidden>
        <h3>Hints</h3>
        <ol id="hint-list"></ol>
      </aside>
    </div>

    <div id="status-bar">
      <span id="question-counter">Question 0 / 21</span>
      <span id="status-text"></span>
    </div>

    <form id="ask-form">
      <input
        type="text"
        id="question-input"
        placeholder="Ask a yes/no question or make a guess..."
        autocomplete="off"
        maxlength="500"
        required
      >
      <button type="submit" id="submit-btn">Ask</button>
    </form>

    <div id="game-over-message" hidden></div>
  </main>
  <script src="/static/game.js"></script>
</body>
</html>
