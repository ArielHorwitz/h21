<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — 21 Questions</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" title="Home">&#8962;</a>
    <a href="/help" title="Help">?</a>
    <a href="/settings" title="Settings">&#9881;</a>
  </nav>
  <main>
    <div id="password-banner" class="password-banner" hidden>
      <a href="/settings">Go to Settings</a> and enter the bypass password to play.
    </div>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle" id="game-subtitle">21 Questions</p>
    <p class="date" id="today-date"></p>

    <div id="game-area">
      <div id="question-log"></div>

      <aside id="hint-panel" hidden>
        <h3>Hints</h3>
        <ol id="hint-list"></ol>
      </aside>
    </div>

    <div id="status-bar">
      <span id="question-counter">Question 0 / 21</span>
      <span id="pow-status"></span>
    </div>

    <form id="ask-form">
      <input
        type="text"
        id="question-input"
        placeholder="Ask a yes/no question or make a guess..."
        autocomplete="off"
        maxlength="500"
        required
      >
      <button type="submit" id="submit-btn">Ask</button>
    </form>

    <div id="game-over-message" hidden></div>
  </main>
  <script src="/static/game.js"></script>
</body>
</html>
