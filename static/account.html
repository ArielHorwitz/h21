<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%231a1a2e'/><text x='50' y='76' font-size='80' font-weight='bold' font-family='sans-serif' fill='%23e2b714' text-anchor='middle'>H</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — Account</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" title="Home">&#8962;</a>
    <a href="/help" title="Help">?</a>
    <a href="/account" title="Account">&#9823;</a>
  </nav>
  <main>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle">Account</p>

    <div id="account-info" class="auth-section">
      <div class="settings-field">
        <label>Username</label>
        <p id="account-username" class="account-value"></p>
      </div>
      <div class="settings-actions">
        <a href="/control" id="control-link" class="secondary-btn" hidden>Control Panel</a>
        <button type="button" id="logout-btn">Log out</button>
        <button type="button" id="back-btn" class="secondary-btn">Back</button>
      </div>
    </div>

    <div id="history-section" class="auth-section" style="margin-top: 1.5rem;" hidden>
      <h2>Game History</h2>
      <div id="history-list"></div>
    </div>
  </main>
  <script src="/static/account.js"></script>
</body>
</html>
