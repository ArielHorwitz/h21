<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%231a1a2e'/><text x='50' y='76' font-size='80' font-weight='bold' font-family='sans-serif' fill='%23e2b714' text-anchor='middle'>H</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <h1>H21</h1>
    <p class="subtitle">21 Questions</p>

    <div id="login-section" class="auth-section">
      <h2>Log in</h2>
      <form id="login-form">
        <div class="settings-field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" autocomplete="username" maxlength="40" required>
        </div>
        <div class="settings-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </div>
        <button type="submit" id="login-btn">Log in</button>
        <p id="login-status" hidden></p>
      </form>
    </div>

    <div id="register-section" class="auth-section">
      <h2>Register</h2>
      <form id="register-form">
        <div class="settings-field">
          <label for="register-username">Username</label>
          <input type="text" id="register-username" autocomplete="username" maxlength="40" required>
        </div>
        <div class="settings-field">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" autocomplete="new-password" minlength="4" required>
        </div>
        <div class="settings-field">
          <label for="register-invite">Invite code</label>
          <input type="text" id="register-invite" autocomplete="off" maxlength="20" required>
        </div>
        <button type="submit" id="register-btn">Register</button>
        <p id="register-status" hidden></p>
      </form>
    </div>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
