<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — Settings</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle">Settings</p>

    <form id="settings-form">
      <div class="settings-field">
        <label for="nickname-input">Nickname</label>
        <input
          type="text"
          id="nickname-input"
          placeholder="Your display name"
          autocomplete="off"
          maxlength="40"
        >
      </div>

      <div class="settings-field" id="password-field" hidden>
        <label for="password-input">PoW Bypass Password</label>
        <input
          type="password"
          id="password-input"
          placeholder="Password"
          autocomplete="off"
        >
      </div>

      <div class="settings-actions">
        <button type="submit" id="save-btn">Save</button>
        <button type="button" id="back-btn" class="secondary-btn">Back</button>
      </div>
      <p id="save-status" hidden></p>
    </form>
  </main>
  <script src="/static/settings.js"></script>
</body>
</html>
