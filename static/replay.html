  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H21 — Replay</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/" title="Home"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></a>
    <a href="/help" title="Help"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 115.12 2.12C13.24 12 12 12.5 12 14"/><circle cx="12" cy="18" r="0.5" fill="currentColor"/></svg></a>

  </nav>
  <main>
    <h1><a href="/" class="home-link">H21</a></h1>
    <p class="subtitle" id="replay-subtitle">Game Replay</p>

    <div id="replay-error" hidden></div>

    <div id="replay-content" hidden>
      <div id="replay-meta"></div>

      <div id="spoiler-gate">
        <p>This replay contains spoilers including all questions, answers, and the solution.</p>
        <button id="reveal-btn">Reveal Game</button>
      </div>

      <div id="replay-details" hidden>
        <div id="replay-result"></div>
        <div id="replay-question-log"></div>

        <aside id="replay-hints">
          <h3>Hints</h3>
          <ol id="replay-hint-list"></ol>
        </aside>

        <div id="replay-solution"></div>
      </div>
    </div>
  </main>
  <script src="/static/replay.js"></script>
</body>
</html>
